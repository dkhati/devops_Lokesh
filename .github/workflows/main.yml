
name: CI-CD
on:
  push:
    branches: [ "main" ] # Triggers the deploy every time you push code to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to your project folder on the server
            cd ~/node/docker-compose-react-nodejs-mysql/devops_Lokesh
            
            # 2. Pull down the newest code changes from GitHub
            git pull origin main
            
            # 3. Rebuild the frontend and backend images, then restart the containers smoothly
            docker compose up -d --build --remove-orphans
