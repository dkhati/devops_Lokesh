name: CI-CD
on:
  push:
    branches: [ "main" ] # Triggers the deploy every time you push code to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to your project folder on the server
            cd ~/node/docker-compose-react-nodejs-mysql/devops_Lokesh
            
            # 2. Pull down the newest code changes from GitHub
            git pull origin main
            
            # 3. Clean up the current stack's containers and networks
            docker compose down
            
            # 4. Force remove the old duplicate containers that cause port conflicts
            docker rm -f docker-compose-react-nodejs-mysql-bezkoder-api-1 docker-compose-react-nodejs-mysql-bezkoder-ui-1 || true
            
            # 5. Rebuild and start the new containers cleanly
            docker compose up -d --build --remove-orphans
